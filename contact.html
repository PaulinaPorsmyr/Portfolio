<main class="projects-container">
    <header class="projects-header">
        <h1>Contact Me</h1>
        <p>I'm always open to discussing new projects, creative ideas, or internship opportunities.</p>
    </header>

    <div class="project-card form-container" style="max-width: 500px; margin: 0 auto; padding: 3rem;">
        <form id="contact-form">
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label class="required-field" for="user_name" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Name</label>
                <input type="text" id="user_name" name="from_name" placeholder="Jane Doe" required style="width: 100%;">
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label class="required-field" for="user_email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email</label>
                <input type="email" id="user_email" name="reply_to" placeholder="jane.doe@example.com" required style="width: 100%;">
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label class="required-field" for="message" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Hi Paulina! Let's connect..." required style="width: 100%; resize: vertical;"></textarea>
            </div>

            <button class="submit-btn" type="submit" id="submit-btn" style="width: 100%; padding: 1rem; cursor: pointer;">
                Send Message →
            </button>
        </form>

        <div id="form-success-message-container" class="hidden" style="text-align: center;">
            <div style="font-size: 3.5rem; margin-bottom: 1rem; color: rgb(255, 242, 0);">✓</div>
            <h2 style="font-family: 'Michroma', sans-serif;">Message Sent!</h2>
            <p>Thank you for reaching out. I'll get back to you soon!</p>
        </div>
    </div>
</main>
